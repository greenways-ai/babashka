name: Sync Upstream and Release

on:
  # Run every hour to check for upstream changes
  schedule:
    - cron: '0 * * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no changes detected'
        required: false
        default: 'false'
      version_bump:
        description: 'Version bump type (patch/minor/major/none)'
        required: false
        default: 'patch'

env:
  UPSTREAM_REPO: babashka/babashka
  UPSTREAM_CORE_REPO: babashka/babashka.core
  FEATURE_BRANCH: greenways/fn
  RELEASE_BRANCH: master
  GIT_AUTHOR_NAME: 'Greenways Bot'
  GIT_AUTHOR_EMAIL: 'bot@greenways.ai'

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_sync: ${{ steps.check.outputs.should_sync }}
      core_commit: ${{ steps.check.outputs.core_commit }}
      core_commit_msg: ${{ steps.check.outputs.core_commit_msg }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Check for upstream babashka.core changes
        id: check
        run: |
          # Fetch latest from babashka.core
          cd babashka.core
          git fetch origin main
          
          LATEST_CORE_COMMIT=$(git rev-parse origin/main)
          CURRENT_CORE_COMMIT=$(git rev-parse HEAD)
          
          echo "Latest core commit: $LATEST_CORE_COMMIT"
          echo "Current core commit: $CURRENT_CORE_COMMIT"
          
          if [ "$LATEST_CORE_COMMIT" != "$CURRENT_CORE_COMMIT" ] || [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "should_sync=true" >> $GITHUB_OUTPUT
            echo "core_commit=$LATEST_CORE_COMMIT" >> $GITHUB_OUTPUT
            echo "core_commit_msg=$(git log -1 --pretty=format:'%s' origin/main)" >> $GITHUB_OUTPUT
            echo "New commits detected in babashka.core"
          else
            echo "should_sync=false" >> $GITHUB_OUTPUT
            echo "No new commits in babashka.core"
          fi

  sync-and-release:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "$GIT_AUTHOR_NAME"
          git config --global user.email "$GIT_AUTHOR_EMAIL"
          git config --global pull.rebase true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Clojure tools
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
          lein: latest

      - name: Update babashka.core submodule
        run: |
          cd babashka.core
          git checkout main
          git pull origin main
          cd ..
          
          # Stage the submodule update
          git add babashka.core
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No submodule changes to commit"
            exit 0
          fi
          
          git commit -m "chore: update babashka.core submodule to ${{ needs.check-upstream.outputs.core_commit_msg }}"

      - name: Fetch and rebase feature branch
        run: |
          git fetch origin $FEATURE_BRANCH
          git checkout -B $FEATURE_BRANCH origin/$FEATURE_BRANCH
          
          # Try to rebase on master
          git fetch origin $RELEASE_BRANCH
          git rebase origin/$RELEASE_BRANCH || {
            echo "Rebase failed, attempting merge instead"
            git rebase --abort
            git merge origin/$RELEASE_BRANCH --no-edit || {
              echo "Merge failed, manual intervention required"
              exit 1
            }
          }

      - name: Apply feature changes to release branch
        run: |
          git checkout $RELEASE_BRANCH
          
          # Merge the feature branch into release branch
          git merge $FEATURE_BRANCH --no-edit -m "feat: add IFn and IPersistentMap support for deftype

Sync with babashka.core @ ${{ needs.check-upstream.outputs.core_commit }}

Changes:
- Add SciFn.java for IFn support in deftype
- Add SciMapFn.java for IPersistentMap support
- Update deftype implementation"

      - name: Bump version
        id: version
        run: |
          CURRENT_VERSION=$(cat resources/BABASHKA_VERSION)
          echo "Current version: $CURRENT_VERSION"
          
          # Extract version components
          if [[ $CURRENT_VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-SNAPSHOT)?$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
          else
            echo "Version format not recognized, defaulting to patch bump"
            MAJOR=1; MINOR=12; PATCH=217
          fi
          
          BUMP_TYPE="${{ github.event.inputs.version_bump || 'patch' }}"
          
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch|*)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH-greenways"
          echo "$NEW_VERSION" > resources/BABASHKA_VERSION
          
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          git add resources/BABASHKA_VERSION
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]" || echo "No version change to commit"

      - name: Push changes
        run: |
          git push origin $RELEASE_BRANCH
          git push origin $FEATURE_BRANCH

      - name: Create Git Tag
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

      - name: Trigger Build Workflow
        run: |
          gh workflow run build.yml --ref $RELEASE_BRANCH
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Create Summary
        run: |
          echo "## Sync Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **babashka.core commit:** ${{ needs.check-upstream.outputs.core_commit }}" >> $GITHUB_STEP_SUMMARY
          echo "- **babashka.core message:** ${{ needs.check-upstream.outputs.core_commit_msg }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New version:** ${{ steps.version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release branch:** $RELEASE_BRANCH" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build workflow has been triggered." >> $GITHUB_STEP_SUMMARY
